<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - PayVora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../static/img/Payvora.ico">
    <!-- Load Lucide icons in head to ensure availability -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../static/css/start.css">
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="login-container glass-strong">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../static/img/Payvora.svg" alt="PayVora" class="logo-img" onerror="this.style.filter='none'; this.src='https://cdn-icons-png.flaticon.com/512/616/616490.png'">
            <h1 class="logo-text">PayVora</h1>
            <p class="welcome-text">Sign in to manage your assets</p>
        </div>

        <!-- Google Sign In -->
        <button class="google-btn" onclick="location.href='dashboard.html'">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <!-- Info Grid -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-title">Secure</div>
                <div class="info-desc">Bank-grade encryption</div>
            </div>
            <div class="info-card">
                <div class="info-title">Privacy</div>
                <div class="info-desc">OAuth 2.0 Standard</div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6">
            <!-- Back Link -->
            <a href="index.html" class="back-link">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                Back to home
            </a>

            <!-- Security Footer -->
            <div class="footer-secure">
                <i data-lucide="shield-check" style="width: 14px; height: 14px;"></i>
                <span>Protected by Google Secure Auth</span>
            </div>
        </div>
    </div>

    <script>
        // Use window.onload to ensure Lucide library is ready before calling createIcons
        window.onload = function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                console.error('Lucide library failed to load.');
            }
        };
    </script>
</body>
</html>
